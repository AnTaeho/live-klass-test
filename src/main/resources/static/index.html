<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Klass</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fa; color: #1a1a1a; min-height: 100vh; }

/* ── Header ── */
.header { background: #fff; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 20px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; cursor: pointer; }
.header-nav { display: flex; align-items: center; gap: 4px; }
.nav-btn { padding: 7px 14px; border: none; background: none; font-size: 14px; font-weight: 500; color: #555; cursor: pointer; border-radius: 6px; transition: background 0.15s; }
.nav-btn:hover { background: #f0f0f0; }
.nav-btn.active { color: #1a1a2e; background: #f0f0f0; }
.btn-login { background: #1a1a2e; color: #fff !important; border-radius: 6px; }
.btn-login:hover { background: #2e2e50 !important; }
.header-user { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #555; }
.header-user strong { color: #1a1a2e; }
.btn-sm { padding: 5px 10px; font-size: 12px; border: 1px solid #ddd; background: #fff; border-radius: 5px; cursor: pointer; color: #555; }
.btn-sm:hover { border-color: #999; }

/* ── Page sections ── */
.page { display: none; }
.page.active { display: block; }
.section { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

/* ── Hero ── */
.hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 48px 0 40px; }
.hero-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.hero p { font-size: 15px; color: #aab; }

/* ── Section header ── */
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.sec-title { font-size: 18px; font-weight: 700; }

/* ── Cards ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card { background: #fff; border-radius: 12px; padding: 22px; border: 1px solid #eee; transition: box-shadow 0.15s; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.card-tag { margin-bottom: 10px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
.card-desc { font-size: 13px; color: #777; margin-bottom: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-info { display: flex; gap: 12px; font-size: 12px; color: #999; margin-bottom: 12px; flex-wrap: wrap; }
.card-price { font-size: 17px; font-weight: 800; color: #1a1a2e; margin-bottom: 10px; }
.cap-row { display: flex; justify-content: space-between; font-size: 12px; color: #999; margin-bottom: 5px; }
.cap-bar { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 14px; }
.cap-fill { height: 4px; border-radius: 2px; background: #4caf50; }
.cap-fill.warn { background: #ff9800; }
.cap-fill.full { background: #f44336; }
.card-actions { display: flex; gap: 8px; }

/* ── Badge ── */
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.b-open   { background: #e8f5e9; color: #2e7d32; }
.b-draft  { background: #f5f5f5; color: #757575; }
.b-closed { background: #fce4ec; color: #b71c1c; }
.b-pending   { background: #fff8e1; color: #e65100; }
.b-confirmed { background: #e8f5e9; color: #2e7d32; }
.b-cancelled { background: #f5f5f5; color: #9e9e9e; }
.b-waiting   { background: #e3f2fd; color: #1565c0; }
.b-promoted  { background: #f3e5f5; color: #6a1b9a; }

/* ── Buttons ── */
.btn { padding: 9px 16px; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, background 0.15s; }
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #1a1a2e; color: #fff; }
.btn-green   { background: #43a047; color: #fff; }
.btn-orange  { background: #fb8c00; color: #fff; }
.btn-red     { background: #e53935; color: #fff; }
.btn-ghost   { background: #fff; color: #555; border: 1px solid #ddd; }
.btn-ghost:hover { background: #f7f7f7; opacity: 1; }
.btn-full { width: 100%; padding: 12px; font-size: 15px; }

/* ── List items ── */
.item-list { display: flex; flex-direction: column; gap: 10px; }
.item { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
.item-body { flex: 1; }
.item-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.item-sub   { font-size: 12px; color: #999; }
.item-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

/* ── Modal ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 32px; width: 420px; max-width: calc(100vw - 32px); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.modal .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-actions .btn { flex: 1; padding: 12px; }

/* ── Form ── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 7px;
  font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.15s; }
.form-group input:focus, .form-group textarea:focus { border-color: #1a1a2e; }
.form-group textarea { resize: vertical; min-height: 72px; }

/* ── Role toggle ── */
.role-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
.role-opt { flex: 1; padding: 12px 8px; text-align: center; border: 2px solid #e0e0e0; border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: 600; color: #777; transition: all 0.15s; }
.role-opt.on { border-color: #1a1a2e; background: #1a1a2e; color: #fff; }

/* ── Modal tab ── */
.modal-tabs { display: flex; border-bottom: 2px solid #f0f0f0; margin-bottom: 24px; }
.modal-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.modal-tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; }
.modal-panel { display: none; }
.modal-panel.active { display: block; }

/* ── Student list ── */
.student-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
.student-row .name { font-size: 14px; font-weight: 600; }
.student-row .email { font-size: 12px; color: #999; }

/* ── Empty / loading ── */
.empty { text-align: center; padding: 56px 24px; color: #bbb; }
.empty p { font-size: 15px; margin-bottom: 6px; }
.empty small { font-size: 13px; }
.loading { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }

/* ── Toast ── */
#toast { position: fixed; bottom: 28px; right: 28px; padding: 13px 20px; border-radius: 9px; font-size: 14px; font-weight: 500; background: #1a1a2e; color: #fff; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999; max-width: 300px; }
#toast.show { opacity: 1; }
#toast.ok  { background: #2e7d32; }
#toast.err { background: #c62828; }
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header class="header">
  <div class="header-inner">
    <span class="logo" onclick="goHome()">Live Klass</span>
    <nav class="header-nav" id="header-nav">
      <!-- 비로그인: 로그인 버튼 -->
      <div id="nav-guest">
        <button class="nav-btn btn-login" onclick="openLogin()">로그인 / 가입</button>
      </div>
      <!-- 수강생 로그인 후 -->
      <div id="nav-student" style="display:none;align-items:center;gap:4px">
        <button class="nav-btn" id="snav-explore" onclick="showPage('explore')">강의 탐색</button>
        <button class="nav-btn" id="snav-enrollments" onclick="showPage('my-enrollments')">내 수강신청</button>
        <button class="nav-btn" id="snav-waitlist" onclick="showPage('waitlist')">대기열</button>
        <div class="header-user" style="margin-left:12px">
          <strong id="nav-username"></strong>
          <button class="btn-sm" onclick="logout()">로그아웃</button>
        </div>
      </div>
      <!-- 강사 로그인 후 -->
      <div id="nav-creator" style="display:none;align-items:center;gap:4px">
        <button class="nav-btn" id="cnav-classes" onclick="showPage('my-classes')">내 강의</button>
        <button class="nav-btn" id="cnav-create" onclick="showPage('create-class')">강의 만들기</button>
        <div class="header-user" style="margin-left:12px">
          <strong id="nav-creator-name"></strong> <span style="color:#999;font-size:12px">강사</span>
          <button class="btn-sm" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </nav>
  </div>
</header>

<!-- ═══════════════ PAGE: 메인 (강의 탐색) ═══════════════ -->
<div id="page-explore" class="page active">
  <div class="hero">
    <div class="hero-inner">
      <h1>지금 바로 시작하는 라이브 강의</h1>
      <p>실력 있는 강사들의 강의를 수강하고 빠르게 성장하세요</p>
    </div>
  </div>
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">열린 강의</span>
      <button class="btn btn-ghost" onclick="loadOpenClasses()">새로고침</button>
    </div>
    <div id="class-grid" class="card-grid"><div class="loading">강의를 불러오는 중...</div></div>
  </div>
</div>

<!-- ═══════════════ PAGE: 내 수강신청 ═══════════════ -->
<div id="page-my-enrollments" class="page">
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">내 수강신청</span>
      <button class="btn btn-ghost" onclick="loadMyEnrollments()">새로고침</button>
    </div>
    <div id="enrollment-list" class="item-list"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- ═══════════════ PAGE: 대기열 ═══════════════ -->
<div id="page-waitlist" class="page">
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">대기열</span>
      <button class="btn btn-ghost" onclick="loadWaitlist()">새로고침</button>
    </div>
    <div id="waitlist-list" class="item-list"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- ═══════════════ PAGE: 내 강의 (강사) ═══════════════ -->
<div id="page-my-classes" class="page">
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">내 강의</span>
      <button class="btn btn-ghost" onclick="loadMyClasses()">새로고침</button>
    </div>
    <div id="my-class-grid" class="card-grid"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- ═══════════════ PAGE: 강의 만들기 (강사) ═══════════════ -->
<div id="page-create-class" class="page">
  <div class="section" style="max-width:600px">
    <div class="sec-header"><span class="sec-title">새 강의 개설</span></div>
    <div class="card" style="border:none;box-shadow:none">
      <div class="form-group"><label>강의 제목</label><input id="new-title" placeholder="ex) Spring Boot 완전 정복"></div>
      <div class="form-group"><label>강의 설명</label><textarea id="new-desc" placeholder="강의에 대해 설명해주세요"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>가격 (원)</label><input id="new-price" type="number" value="0" min="0"></div>
        <div class="form-group"><label>최대 정원 (명)</label><input id="new-cap" type="number" value="10" min="1"></div>
        <div class="form-group"><label>시작일</label><input id="new-start" type="date"></div>
        <div class="form-group"><label>종료일</label><input id="new-end" type="date"></div>
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="createClass()">강의 개설하기</button>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: 로그인/가입 ═══════════════ -->
<div id="modal-login" class="overlay">
  <div class="modal">
    <h2>Live Klass</h2>
    <div class="modal-tabs">
      <div class="modal-tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
      <div class="modal-tab" id="tab-register" onclick="switchTab('register')">회원가입</div>
    </div>

    <!-- 로그인 패널 -->
    <div class="modal-panel active" id="panel-login">
      <p class="subtitle">가입 시 사용한 이메일로 로그인하세요</p>
      <div class="form-group"><label>이메일</label><input id="login-email" type="email" placeholder="hong@example.com" /></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeOverlay('modal-login')">취소</button>
        <button class="btn btn-primary" onclick="doLogin()">로그인</button>
      </div>
    </div>

    <!-- 회원가입 패널 -->
    <div class="modal-panel" id="panel-register">
      <p class="subtitle">이름과 이메일을 입력하면 바로 시작할 수 있습니다</p>
      <div class="role-toggle">
        <div class="role-opt on" id="role-student" onclick="setRole('student')">수강생</div>
        <div class="role-opt" id="role-creator" onclick="setRole('creator')">강사</div>
      </div>
      <div class="form-group"><label>이름</label><input id="register-name" placeholder="홍길동" /></div>
      <div class="form-group"><label>이메일</label><input id="register-email" type="email" placeholder="hong@example.com" /></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeOverlay('modal-login')">취소</button>
        <button class="btn btn-primary" onclick="doRegister()">가입하기</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: 강의 상세 ═══════════════ -->
<div id="modal-detail" class="overlay">
  <div class="modal" style="width:500px">
    <div style="margin-bottom:12px" id="md-badge"></div>
    <h2 id="md-title" style="margin-bottom:10px"></h2>
    <p id="md-desc" style="font-size:14px;color:#666;line-height:1.6;margin-bottom:18px"></p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;font-size:13px;color:#555">
      <div>💰 <span id="md-price"></span></div>
      <div>👥 <span id="md-capacity"></span></div>
      <div>📅 <span id="md-dates"></span></div>
      <div>👨‍🏫 <span id="md-creator"></span></div>
    </div>
    <div class="cap-row"><span>수강 현황</span><span id="md-cap-text"></span></div>
    <div class="cap-bar"><div class="cap-fill" id="md-cap-fill" style="width:0%"></div></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('modal-detail')">닫기</button>
      <button class="btn btn-green" id="md-enroll-btn" onclick="enrollFromDetail()">수강신청</button>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: 수강생 목록 ═══════════════ -->
<div id="modal-students" class="overlay">
  <div class="modal" style="width:480px">
    <h2 style="margin-bottom:16px">수강생 목록</h2>
    <div id="student-list"></div>
    <div style="margin-top:16px">
      <button class="btn btn-ghost btn-full" onclick="closeOverlay('modal-students')">닫기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════
//  State
// ══════════════════════════════════════
let user = null;          // { id, name, role }
let selectedRole = 'student';
let detailClassId = null;
let myClassIds = [];      // 이 세션에서 개설한 강의 IDs

// ══════════════════════════════════════
//  API helper — CommonResponse: { result, page }
// ══════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); } catch { json = null; }
  if (!res.ok) {
    const msg = json?.message || json?.error || text || `오류 ${res.status}`;
    throw new Error(msg);
  }
  return json; // { result, page }
}

// ══════════════════════════════════════
//  Toast
// ══════════════════════════════════════
let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 3200);
}

// ══════════════════════════════════════
//  Page / nav routing
// ══════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');

  // nav 활성 표시
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { explore: 'snav-explore', 'my-enrollments': 'snav-enrollments', waitlist: 'snav-waitlist',
                'my-classes': 'cnav-classes', 'create-class': 'cnav-create' };
  if (map[name]) document.getElementById(map[name])?.classList.add('active');

  // 페이지 진입 시 데이터 로드
  if (name === 'explore')        loadOpenClasses();
  if (name === 'my-enrollments') loadMyEnrollments();
  if (name === 'waitlist')       loadWaitlist();
  if (name === 'my-classes')     loadMyClasses();
  if (name === 'create-class')   initCreateForm();
}

function goHome() { showPage('explore'); }

function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ══════════════════════════════════════
//  Header nav 상태
// ══════════════════════════════════════
function updateNav() {
  document.getElementById('nav-guest').style.display   = user ? 'none' : 'block';
  document.getElementById('nav-student').style.display = (user && user.role === 'student') ? 'flex' : 'none';
  document.getElementById('nav-creator').style.display = (user && user.role === 'creator') ? 'flex' : 'none';
  if (user) {
    document.getElementById('nav-username').textContent = user.name;
    document.getElementById('nav-creator-name').textContent = user.name;
  }
}

// ══════════════════════════════════════
//  Login / Register
// ══════════════════════════════════════
function openLogin() {
  switchTab('login');
  openOverlay('modal-login');
}

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
}

function setRole(role) {
  selectedRole = role;
  document.getElementById('role-student').classList.toggle('on', role === 'student');
  document.getElementById('role-creator').classList.toggle('on', role === 'creator');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { toast('이메일을 입력해주세요', 'err'); return; }

  try {
    const res = await api('POST', '/api/members/login', { email });
    user = { id: res.result.id, name: res.result.name, role: res.result.role };
    myClassIds = [];
    closeOverlay('modal-login');
    updateNav();
    toast(`환영합니다, ${user.name}님!`, 'ok');
    if (user.role === 'creator') showPage('my-classes');
    else showPage('explore');
  } catch (e) {
    toast(e.message, 'err');
  }
}

async function doRegister() {
  const name  = document.getElementById('register-name').value.trim();
  const email = document.getElementById('register-email').value.trim();
  if (!name || !email) { toast('이름과 이메일을 입력해주세요', 'err'); return; }

  try {
    const url = selectedRole === 'creator' ? '/api/members/creator' : '/api/members';
    const res = await api('POST', url, { name, email });
    user = { id: res.result.id, name, role: selectedRole };
    myClassIds = [];
    closeOverlay('modal-login');
    updateNav();
    toast(`가입 완료! 환영합니다, ${name}님!`, 'ok');
    if (selectedRole === 'creator') showPage('my-classes');
    else showPage('explore');
  } catch (e) {
    toast(e.message, 'err');
  }
}

function logout() {
  user = null;
  myClassIds = [];
  updateNav();
  showPage('explore');
  toast('로그아웃 되었습니다');
}

// ══════════════════════════════════════
//  강의 탐색 (메인)
// ══════════════════════════════════════
async function loadOpenClasses() {
  const grid = document.getElementById('class-grid');
  grid.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await api('GET', '/api/classes?status=OPEN');
    const classes = res.result?.classes ?? [];
    if (!classes.length) {
      grid.innerHTML = '<div class="empty"><p>열린 강의가 없습니다</p></div>';
      return;
    }
    // 상세 정보 병렬 조회
    const details = await Promise.all(classes.map(c => api('GET', `/api/classes/${c.id}`).then(r => r.result)));
    grid.innerHTML = '';
    details.forEach(d => grid.appendChild(makeClassCard(d)));
  } catch (e) {
    grid.innerHTML = `<div class="empty"><p>오류: ${e.message}</p></div>`;
  }
}

function makeClassCard(d) {
  const pct   = d.maxCapacity > 0 ? Math.min(100, Math.round(d.currentEnrollmentCount / d.maxCapacity * 100)) : 0;
  const full  = d.currentEnrollmentCount >= d.maxCapacity;
  const fillCls = pct >= 100 ? 'full' : pct >= 70 ? 'warn' : '';

  const card = el('div', 'card');
  card.innerHTML = `
    <div class="card-tag"><span class="badge b-open">모집 중</span></div>
    <div class="card-title">${esc(d.title)}</div>
    <div class="card-desc">${esc(d.description)}</div>
    <div class="card-info">
      <span>👨‍🏫 ${esc(d.creatorName)}</span>
      <span>📅 ${d.startDate} ~ ${d.endDate}</span>
    </div>
    <div class="card-price">${d.price === 0 ? '무료' : d.price.toLocaleString() + '원'}</div>
    <div class="cap-row">
      <span>${full ? '⚠️ 마감 (대기 가능)' : '수강 현황'}</span>
      <span>${d.currentEnrollmentCount} / ${d.maxCapacity}명</span>
    </div>
    <div class="cap-bar"><div class="cap-fill ${fillCls}" style="width:${pct}%"></div></div>
    <div class="card-actions">
      <button class="btn btn-ghost" onclick="openDetail(${d.id})">상세보기</button>
      <button class="btn ${full ? 'btn-orange' : 'btn-green'}" onclick="enrollClick(${d.id}, ${full}, this)">
        ${full ? '대기 신청' : '수강신청'}
      </button>
    </div>`;
  return card;
}

async function enrollClick(classId, isFull, btn) {
  if (!user) { toast('로그인 후 이용하실 수 있습니다', 'err'); openLogin(); return; }
  if (user.role === 'creator') { toast('강사는 수강신청을 할 수 없습니다', 'err'); return; }
  await doEnroll(classId, btn, isFull ? '대기 신청' : '수강신청');
}

async function doEnroll(classId, btn, origText) {
  btn.disabled = true;
  btn.textContent = '처리 중...';
  try {
    const res = await api('POST', '/api/enrollments', { liveClassId: classId, memberId: user.id });
    const d = res.result;
    if (d.resultType === 'ENROLLED') {
      toast('수강신청 완료! 내 수강신청에서 결제해주세요 💳', 'ok');
    } else {
      toast(`대기 등록 완료! 현재 ${d.waitListPosition}번째입니다 🕐`, 'ok');
    }
    loadOpenClasses();
  } catch (e) {
    toast(e.message, 'err');
    btn.disabled = false;
    btn.textContent = origText;
  }
}

// ── 강의 상세 모달
async function openDetail(classId) {
  detailClassId = classId;
  try {
    const res = await api('GET', `/api/classes/${classId}`);
    const d = res.result;
    const pct  = d.maxCapacity > 0 ? Math.min(100, Math.round(d.currentEnrollmentCount / d.maxCapacity * 100)) : 0;
    const full = d.currentEnrollmentCount >= d.maxCapacity;
    document.getElementById('md-badge').innerHTML = `<span class="badge b-open">모집 중</span>`;
    document.getElementById('md-title').textContent    = d.title;
    document.getElementById('md-desc').textContent     = d.description;
    document.getElementById('md-price').textContent    = d.price === 0 ? '무료' : d.price.toLocaleString() + '원';
    document.getElementById('md-capacity').textContent = `${d.currentEnrollmentCount} / ${d.maxCapacity}명`;
    document.getElementById('md-dates').textContent    = `${d.startDate} ~ ${d.endDate}`;
    document.getElementById('md-creator').textContent  = d.creatorName;
    document.getElementById('md-cap-text').textContent = `${pct}%`;
    const fill = document.getElementById('md-cap-fill');
    fill.style.width = pct + '%';
    fill.className   = 'cap-fill ' + (pct >= 100 ? 'full' : pct >= 70 ? 'warn' : '');
    const btn = document.getElementById('md-enroll-btn');
    btn.textContent = full ? '대기 신청' : '수강신청';
    btn.className   = 'btn ' + (full ? 'btn-orange' : 'btn-green');
    btn.disabled    = false;
    openOverlay('modal-detail');
  } catch (e) { toast(e.message, 'err'); }
}

async function enrollFromDetail() {
  if (!user) { closeOverlay('modal-detail'); openLogin(); return; }
  if (user.role === 'creator') { toast('강사는 수강신청을 할 수 없습니다', 'err'); return; }
  const btn = document.getElementById('md-enroll-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '처리 중...';
  try {
    const res = await api('POST', '/api/enrollments', { liveClassId: detailClassId, memberId: user.id });
    const d = res.result;
    closeOverlay('modal-detail');
    if (d.resultType === 'ENROLLED') toast('수강신청 완료! 내 수강신청에서 결제해주세요 💳', 'ok');
    else toast(`대기 등록 완료! 현재 ${d.waitListPosition}번째입니다 🕐`, 'ok');
    loadOpenClasses();
  } catch (e) {
    toast(e.message, 'err');
    btn.disabled = false;
    btn.textContent = orig;
  }
}

// ══════════════════════════════════════
//  내 수강신청
// ══════════════════════════════════════
async function loadMyEnrollments() {
  const list = document.getElementById('enrollment-list');
  list.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await api('GET', `/api/enrollments/my/${user.id}?page=0&size=20`);
    // CommonResponse.of(Page) → result = content array, page = pageInfo
    const items = res.result ?? [];
    if (!items.length) { list.innerHTML = '<div class="empty"><p>수강신청 내역이 없습니다</p></div>'; return; }
    list.innerHTML = '';
    items.forEach(e => list.appendChild(makeEnrollItem(e)));
  } catch (e) { list.innerHTML = `<div class="empty"><p>오류: ${e.message}</p></div>`; }
}

function makeEnrollItem(e) {
  const map = { PENDING: ['b-pending','결제 대기'], CONFIRMED: ['b-confirmed','결제 완료'], CANCELLED: ['b-cancelled','취소됨'] };
  const [cls, label] = map[e.status] ?? ['b-cancelled', e.status];

  let actions = '';
  if (e.status === 'PENDING') {
    actions = `<button class="btn btn-green" onclick="doPay(${e.enrollmentId},this)">결제하기</button>
               <button class="btn btn-ghost" onclick="doCancel(${e.enrollmentId},this)">취소</button>`;
  } else if (e.status === 'CONFIRMED') {
    actions = `<button class="btn btn-ghost" onclick="doCancel(${e.enrollmentId},this)">취소</button>`;
  }

  const item = el('div', 'item');
  item.innerHTML = `
    <div class="item-body">
      <div class="item-title">${esc(e.classTitle)}</div>
      <div class="item-sub">신청 번호 #${e.enrollmentId}</div>
    </div>
    <div class="item-actions">
      <span class="badge ${cls}">${label}</span>
      ${actions}
    </div>`;
  return item;
}

async function doPay(enrollmentId, btn) {
  btn.disabled = true; btn.textContent = '처리 중...';
  try {
    await api('POST', '/api/enrollments/payment', { memberId: user.id, enrollmentId });
    toast('결제 완료! 수강이 확정되었습니다 ✅', 'ok');
    loadMyEnrollments();
  } catch (e) {
    toast(e.message, 'err');
    btn.disabled = false; btn.textContent = '결제하기';
  }
}

async function doCancel(enrollmentId, btn) {
  if (!confirm('수강신청을 취소할까요?')) return;
  btn.disabled = true;
  try {
    await api('DELETE', `/api/enrollments/${enrollmentId}?memberId=${user.id}`);
    toast('수강신청이 취소되었습니다', 'ok');
    loadMyEnrollments();
  } catch (e) {
    toast(e.message, 'err');
    btn.disabled = false;
  }
}

// ══════════════════════════════════════
//  대기열
// ══════════════════════════════════════
async function loadWaitlist() {
  const list = document.getElementById('waitlist-list');
  list.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await api('GET', `/api/waitlists/my/${user.id}`);
    const items = res.result ?? [];
    if (!items.length) { list.innerHTML = '<div class="empty"><p>대기 중인 강의가 없습니다</p></div>'; return; }
    list.innerHTML = '';
    items.forEach(w => list.appendChild(makeWaitItem(w)));
  } catch (e) { list.innerHTML = `<div class="empty"><p>오류: ${e.message}</p></div>`; }
}

function makeWaitItem(w) {
  const map = {
    WAITING:  ['b-waiting',  `${w.position}번째 대기 중`],
    PROMOTED: ['b-promoted', '수강신청 완료 → 내 수강신청에서 결제하세요'],
    CANCELLED:['b-cancelled','취소됨'],
    EXPIRED:  ['b-cancelled','만료됨']
  };
  const [cls, label] = map[w.status] ?? ['b-cancelled', w.status];
  const cancelBtn = w.status === 'WAITING'
    ? `<button class="btn btn-ghost" onclick="doCancelWait(${w.waitListId},this)">취소</button>` : '';

  const item = el('div', 'item');
  item.innerHTML = `
    <div class="item-body">
      <div class="item-title">${esc(w.classTitle)}</div>
      <div class="item-sub">대기 번호 #${w.waitListId}</div>
    </div>
    <div class="item-actions">
      <span class="badge ${cls}">${label}</span>
      ${cancelBtn}
    </div>`;
  return item;
}

async function doCancelWait(waitListId, btn) {
  if (!confirm('대기를 취소할까요?')) return;
  btn.disabled = true;
  try {
    await api('DELETE', `/api/waitlists/${waitListId}?memberId=${user.id}`);
    toast('대기가 취소되었습니다', 'ok');
    loadWaitlist();
  } catch (e) { toast(e.message, 'err'); btn.disabled = false; }
}

// ══════════════════════════════════════
//  내 강의 (강사)
// ══════════════════════════════════════
async function loadMyClasses() {
  const grid = document.getElementById('my-class-grid');
  grid.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await api('GET', '/api/classes');
    const all = res.result?.classes ?? [];

    // 내가 만든 강의 필터: 이 세션에서 개설한 ID 또는 creatorName 일치
    const mine = [];
    await Promise.all(all.map(async c => {
      try {
        const r = await api('GET', `/api/classes/${c.id}`);
        if (r.result.creatorName === user.name || myClassIds.includes(c.id)) mine.push(r.result);
      } catch {}
    }));

    if (!mine.length) {
      grid.innerHTML = '<div class="empty"><p>아직 개설한 강의가 없습니다</p><small>강의 만들기 탭에서 첫 강의를 개설해보세요</small></div>';
      return;
    }
    grid.innerHTML = '';
    mine.forEach(d => grid.appendChild(makeMyClassCard(d)));
  } catch (e) { grid.innerHTML = `<div class="empty"><p>오류: ${e.message}</p></div>`; }
}

function makeMyClassCard(d) {
  const statusMap = { DRAFT: ['b-draft','준비 중'], OPEN: ['b-open','모집 중'], CLOSED: ['b-closed','마감'] };
  const [cls, label] = statusMap[d.status] ?? ['b-draft', d.status];
  const pct = d.maxCapacity > 0 ? Math.min(100, Math.round(d.currentEnrollmentCount / d.maxCapacity * 100)) : 0;

  let actions = '';
  if (d.status === 'DRAFT') {
    actions = `<button class="btn btn-green" onclick="doOpen(${d.id},this)">수강 모집 시작</button>
               <button class="btn btn-ghost" onclick="doDelete(${d.id},this)">삭제</button>`;
  } else {
    actions = `<button class="btn btn-ghost" onclick="openStudents(${d.id})">수강생 보기</button>`;
  }

  const card = el('div', 'card');
  card.innerHTML = `
    <div class="card-tag"><span class="badge ${cls}">${label}</span></div>
    <div class="card-title">${esc(d.title)}</div>
    <div class="card-desc">${esc(d.description)}</div>
    <div class="card-info"><span>📅 ${d.startDate} ~ ${d.endDate}</span></div>
    <div class="card-price">${d.price === 0 ? '무료' : d.price.toLocaleString() + '원'}</div>
    <div class="cap-row"><span>수강 현황</span><span>${d.currentEnrollmentCount} / ${d.maxCapacity}명</span></div>
    <div class="cap-bar"><div class="cap-fill" style="width:${pct}%"></div></div>
    <div class="card-actions">${actions}</div>`;
  return card;
}

async function doOpen(classId, btn) {
  btn.disabled = true; btn.textContent = '처리 중...';
  try {
    await api('PATCH', `/api/classes/${classId}/open?creatorId=${user.id}`);
    toast('강의가 오픈되었습니다! 수강생이 신청할 수 있습니다 🎉', 'ok');
    loadMyClasses();
  } catch (e) { toast(e.message, 'err'); btn.disabled = false; btn.textContent = '수강 모집 시작'; }
}

async function doDelete(classId, btn) {
  if (!confirm('강의를 삭제할까요?')) return;
  btn.disabled = true;
  try {
    await api('DELETE', `/api/classes/${classId}?creatorId=${user.id}`);
    myClassIds = myClassIds.filter(id => id !== classId);
    toast('강의가 삭제되었습니다', 'ok');
    loadMyClasses();
  } catch (e) { toast(e.message, 'err'); btn.disabled = false; }
}

async function openStudents(classId) {
  const listEl = document.getElementById('student-list');
  listEl.innerHTML = '<div class="loading">불러오는 중...</div>';
  openOverlay('modal-students');
  try {
    const res = await api('GET', `/api/enrollments/class/${classId}?creatorId=${user.id}&page=0&size=50`);
    const items = res.result ?? [];
    if (!items.length) { listEl.innerHTML = '<div class="empty"><p>수강생이 없습니다</p></div>'; return; }
    const map = { PENDING:'b-pending', CONFIRMED:'b-confirmed', CANCELLED:'b-cancelled' };
    listEl.innerHTML = items.map(s => `
      <div class="student-row">
        <div>
          <div class="name">${esc(s.memberName)}</div>
          <div class="email">${esc(s.memberEmail)}</div>
        </div>
        <span class="badge ${map[s.status]??''}">${s.status}</span>
      </div>`).join('');
  } catch (e) { listEl.innerHTML = `<div class="empty"><p>오류: ${e.message}</p></div>`; }
}

// ══════════════════════════════════════
//  강의 만들기
// ══════════════════════════════════════
function initCreateForm() {
  const fmt = d => d.toISOString().split('T')[0];
  const now = new Date(), end = new Date(now); end.setMonth(end.getMonth() + 2);
  document.getElementById('new-start').value = fmt(now);
  document.getElementById('new-end').value   = fmt(end);
}

async function createClass() {
  const title = document.getElementById('new-title').value.trim();
  const desc  = document.getElementById('new-desc').value.trim();
  const price = parseInt(document.getElementById('new-price').value) || 0;
  const cap   = parseInt(document.getElementById('new-cap').value) || 1;
  const start = document.getElementById('new-start').value;
  const end   = document.getElementById('new-end').value;
  if (!title || !desc || !start || !end) { toast('모든 항목을 입력해주세요', 'err'); return; }
  if (end <= start) { toast('종료일은 시작일 이후여야 합니다', 'err'); return; }
  try {
    const res = await api('POST', `/api/classes?creatorId=${user.id}`, {
      title, description: desc, price, maxCapacity: cap, startDate: start, endDate: end
    });
    myClassIds.push(res.result.id);
    toast(`"${title}" 강의가 개설되었습니다! 내 강의에서 모집을 시작하세요`, 'ok');
    document.getElementById('new-title').value = '';
    document.getElementById('new-desc').value  = '';
    document.getElementById('new-price').value = '0';
    document.getElementById('new-cap').value   = '10';
    initCreateForm();
    showPage('my-classes');
  } catch (e) { toast(e.message, 'err'); }
}

// ══════════════════════════════════════
//  Utils
// ══════════════════════════════════════
function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 초기 로드
loadOpenClasses();
initCreateForm();
</script>
</body>
</html>
